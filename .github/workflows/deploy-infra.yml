name: Deploy EventHub Infrastructure and App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: true
      TF_DIR: ./Infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate temporary SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f eventhub_key -N ""
          echo "PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          cat eventhub_key.pub >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var="public_key=${PUBLIC_KEY}" -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "INSTANCE_ID=$(terraform output -raw instance_id)" >> $GITHUB_ENV
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Show infrastructure outputs
        run: |
          echo "Instance ID: $INSTANCE_ID"
          echo "Public IP: $PUBLIC_IP"

      - name: Wait for SSH to become available
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i eventhub_key ec2-user@$PUBLIC_IP "echo SSH ready"; then
              echo "SSH is ready"
              exit 0
            fi
            echo "Waiting for SSH..."
            sleep 10
          done
          echo "SSH did not become available in time"
          exit 1

      - name: Copy application files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i eventhub_key -r . ec2-user@$PUBLIC_IP:/opt/eventhub

      - name: Install dependencies and start app
        run: |
          ssh -o StrictHostKeyChecking=no -i eventhub_key ec2-user@$PUBLIC_IP << 'EOF'
            cd /opt/eventhub

            python3 -m pip install --upgrade pip
            python3 -m pip install flask
            python3 -m pip install pycryptodome

            pkill -f "python3 app.py" || true
            nohup python3 app.py > app.log 2>&1 &
          EOF

      - name: Verify app process
        run: |
          ssh -o StrictHostKeyChecking=no -i eventhub_key ec2-user@$PUBLIC_IP "ps -ef | grep app.py | grep -v grep"

      - name: Show application URL
        run: |
          echo "EventHub should be reachable at: http://$PUBLIC_IP:5000"